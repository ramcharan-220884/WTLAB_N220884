<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Lab | Events</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav id="mainNav">
        <h2 id="logoText">jQuery Lab</h2>
        <ul id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="selectors.html">Selectors</a></li>
            <li><a href="attributes.html">Attributes</a></li>
            <li><a href="events.html" style="color: var(--primary);">Events</a></li>
            <li><a href="style.html">Style</a></li>
            <li><a href="traversing.html">Traversing</a></li>
            <li><a href="effects.html">Effects</a></li>
        </ul>
        <button id="themeToggle" title="Toggle Theme">🌙</button>
    </nav>

    <div class="container" id="main-container">
        <h1 id="pageTitle">⌨️ Event Handling</h1>

        <div class="demo-card" id="mouse-events">
            <h3 id="mouse-title">1. Mouse Events</h3>
            <div id="event-box" class="box" style="width: 200px; height: 100px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; border-radius: 12px; margin: 20px auto;">
                Hover/Click Me
            </div>
            <div class="btn-group" id="mouse-btns">
                <button id="btn-on" title="Enable custom click event">Turn ON custom click</button>
                <button id="btn-off" title="Disable custom click event">Turn OFF custom click</button>
            </div>
            <p id="event-log" style="font-family: monospace; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 8px;">Event: None</p>
        </div>

        <div class="demo-card" id="keyboard-events">
            <h3 id="keyboard-title">2. Keyboard Events</h3>
            <p id="keyboard-demo">
                <input type="text" id="keyboard-input" placeholder="Type letters here...">
            </p>
            <p id="keyboard-log">Typed: <span id="typed-val"></span> | Last Key: <span id="last-key"></span></p>
        </div>

        <div class="demo-card" id="form-events">
            <h3 id="form-title">3. Form Events</h3>
            <form id="sample-form">
                <p id="form-fields">
                    <input type="text" id="name-field" placeholder="Full Name">
                    <select id="country-select">
                        <option value="">Select Country</option>
                        <option value="USA">USA</option>
                        <option value="India">India</option>
                        <option value="UK">UK</option>
                    </select>
                </p>
                <button type="submit" id="submit-btn" style="background: var(--primary);">Submit Form</button>
            </form>
            <p id="form-log">Status: Idle</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
